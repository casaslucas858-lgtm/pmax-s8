<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo A — PMAX S8</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">PMAX <span>S8</span></div>
            <ul class="nav-links">
                <li><a href="../index.html">Dashboard</a></li>
                <li><a href="equipos.html">Equipos</a></li>
            </ul>
        </nav>
    </header>

    <main class="page-content">
        <section class="page-hero">
            <div class="container">
                <h1>Grupo A</h1>
                <p>Fase de Grupos — Posiciones y Equipos</p>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Tabla de Posiciones</h2>
                </div>
                <div id="standings-container"></div>
            </div>
        </section>

        <section class="section">
            <div class="container">
                <div class="section-header">
                    <h2 class="section-title">Equipos Participantes</h2>
                </div>
                <div class="grid grid-3" id="teams-container-group"></div>
            </div>
        </section>
    </main>

    <script src="../js/nav.js"></script>
    <script src="../js/data.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grupoActual = 'Grupo [LETRA]'; // <--- CAMBIAR ESTO EN CADA ARCHIVO
            
            try {
                // 1. Cargar Standings filtrados
                await PmaxApp.renderStandings(grupoActual);
                
                // 2. Cargar y filtrar equipos manualmente para las cards
                const teams = await PmaxApp.loadData('teams');
                if (teams) {
                    const groupTeams = teams.filter(t => t.group === grupoActual);
                    const container = document.getElementById('teams-container-group');
                    container.innerHTML = groupTeams.map(team => `
                        <div class="card">
                            <h3 class="card-title">${team.name}</h3>
                            <div class="card-content">
                                <p><strong>Jugadores:</strong><br>${team.players.join('<br>')}</p>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) { console.error("Error cargando grupo:", e); }
        });
    </script>
</body>
</html>
